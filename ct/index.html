<body>

<section>

    <p>HTMX를 사용하면 전체 페이지를 다시 로딩하지 않고도 서버에서 HTML 조각을 받아 화면 일부를 교체할 수 있습니다.</p>

</section>

<section style="margin-top:18px">
  <h3>폼 전송 예제</h3>

    <button type="submit">전송</button>
  </form>
