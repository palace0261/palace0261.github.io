<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>픽셀 완성도 디자인 — MyStudio</title>
  <link rel="stylesheet" href="/common.css">
</head>
<body>
  <div id="shared-nav-placeholder"></div>
  <main class="container">
    <div id="diceContainer" class="dice-container" aria-hidden></div>

    <h1>랜덤 숫자 생성기</h1>
    <p>원하는 범위와 개수를 입력하면 랜덤 정수를 생성합니다. 빠른 복사와 기록 기능을 제공합니다.</p>

    <section class="rand-box">
      <label>최소값
        <input id="min" type="number" value="1" />
      </label>
      <label>최대값
        <input id="max" type="number" value="100" />
      </label>
      <label>개수
        <input id="count" type="number" value="3" min="1" max="5" />
      </label>
      <div style="margin-top:12px">
        <button id="generate" class="btn primary">생성</button>
        <button id="clear" class="btn outline" type="button">지우기</button>
      </div>

      <div id="result" aria-live="polite" style="margin-top:18px"></div>

      <div id="actions" style="margin-top:8px;display:flex;gap:8px">
        <button id="copy" class="btn">복사</button>
        <button id="download" class="btn">다운로드(.txt)</button>
      </div>

      <div id="history" style="margin-top:18px">
        <h3>생성 기록</h3>
        <ul id="histList"></ul>
      </div>
    </section>

  </main>

  <footer class="footer">© 2026 MyStudio — Crafted with care</footer>
  <script>
    // load shared nav HTML
    fetch('/nav.html').then(r=>r.text()).then(html=>{
      document.getElementById('shared-nav-placeholder').innerHTML = html;
      const wrapper = document.createElement('div');
      wrapper.innerHTML = '<a href="/" class="btn">돌아가기</a>';
      const nav = document.querySelector('#shared-nav-placeholder .nav');
      if(nav) nav.appendChild(wrapper);
    }).catch(()=>{});

    // Random integer generator using crypto when available
    function randInt(min, max){
      min = Math.ceil(min); max = Math.floor(max);
      if(window.crypto && window.crypto.getRandomValues){
        const range = max - min + 1;
        const maxRange = 4294967296; // 2^32
        const rand32 = new Uint32Array(1);
        window.crypto.getRandomValues(rand32);
        return min + Math.floor((rand32[0] / maxRange) * range);
      }
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    const el = id => document.getElementById(id);
    const generate = el('generate');
    const clear = el('clear');
    const copy = el('copy');
    const download = el('download');
    const result = el('result');
    const histList = el('histList');

    function renderList(arr){
      result.textContent = arr.join(', ');
      histList.insertAdjacentHTML('afterbegin', '<li>'+arr.join(', ')+' <small>(' + new Date().toLocaleString() + ')</small></li>');
    }

    generate.addEventListener('click', ()=>{
      const min = Number(el('min').value);
      const max = Number(el('max').value);
      let count = Number(el('count').value) || 1;
      if(isNaN(min) || isNaN(max) || min>max){
        alert('유효한 최소/최대값을 입력하세요 (최소 ≤ 최대).');
        return;
      }
      if(count < 1) count = 1;
      if(count > 100) count = 100;
      const out = [];
      for(let i=0;i<count;i++) out.push(randInt(min,max));
      renderList(out);

      // create dice elements according to count (1..5)
      const diceContainer = document.getElementById('diceContainer');
      const displayCount = Math.min(Math.max(count,1),5);
      diceContainer.innerHTML = '';
      for(let i=0;i<displayCount;i++){
        const cls = ['dice'];
        if(displayCount===1) cls.push('dice--large');
        else if(displayCount>=4) cls.push('dice--small');
        else if(displayCount===2) cls.push('dice--small');
        const div = document.createElement('div');
        div.className = cls.join(' ');
        div.setAttribute('data-dice-index', String(i));
        // create pip grid
        div.innerHTML = Array.from({length:9}).map(()=>'<span class="pip"></span>').join('');
        diceContainer.appendChild(div);
      }

      // map generated numbers to dice faces 1..6
      const faces = out.slice(0,displayCount).map(n => ((Math.abs(n) - 1) % 6) + 1);
      const diceEls = Array.from(diceContainer.querySelectorAll('.dice'));

      diceEls.forEach((d, i) => {
        // apply roll animation
        d.classList.remove('roll');
        void d.offsetWidth;
        d.classList.add('roll');
        // after short delay, set face pips
        setTimeout(()=>{
          const pipEls = Array.from(d.querySelectorAll('.pip'));
          pipEls.forEach(p => p.classList.remove('on'));
          const face = faces[i] || null;
          if(face){
            const map = {
              1: [4],
              2: [0,8],
              3: [0,4,8],
              4: [0,2,6,8],
              5: [0,2,4,6,8],
              6: [0,2,3,5,6,8]
            };
            const idxs = map[face] || [];
            idxs.forEach(ix => { if(pipEls[ix]) pipEls[ix].classList.add('on'); });
          }
        }, 220);
      });
    });

    clear.addEventListener('click', ()=>{ result.textContent=''; histList.innerHTML=''; });

    copy.addEventListener('click', async ()=>{
      const text = result.textContent;
      if(!text) return alert('복사할 내용이 없습니다.');
      try{
        await navigator.clipboard.writeText(text);
        alert('클립보드에 복사되었습니다.');
      }catch(e){
        alert('복사에 실패했습니다.');
      }
    });

    download.addEventListener('click', ()=>{
      const text = result.textContent;
      if(!text) return alert('다운로드할 내용이 없습니다.');
      const blob = new Blob([text], {type:'text/plain;charset=utf-8'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = 'random.txt';
      document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
    });
  </script>
</body>
</html>
