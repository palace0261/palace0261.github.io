<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>성능 중심 설계 — MyStudio</title>
  <link rel="stylesheet" href="/common.css">
</head>
<body>
  <div id="shared-nav-placeholder"></div>

  <main class="container">
    <h1>성능 중심 설계</h1>
    <img class="detail-img" src="https://images.unsplash.com/photo-1496307042754-b4aa456c4a2d?auto=format&fit=crop&w=1200&q=80" alt="성능 최적화" />
    <p>이미지 지연 로딩, 적절한 포맷 사용, 불필요한 자바스크립트 제거 등으로 성능을 극대화합니다.</p>
    <p>더 많은 사례와 설명을 이곳에 추가하실 수 있습니다.</p>
  </main>

  <script>
    fetch('/nav.html').then(r=>r.text()).then(html=>{
      document.getElementById('shared-nav-placeholder').innerHTML = html;
      const wrapper = document.createElement('div');
      wrapper.innerHTML = '<a href="/" class="btn">돌아가기</a>';
      const nav = document.querySelector('#shared-nav-placeholder .nav');
      if(nav) nav.appendChild(wrapper);
    }).catch(()=>{});
  </script>
  <footer class="footer">© 2026 MyStudio — Crafted with care</footer>
</body>
</html>
